# Dependency Review Workflow
# Scans pull requests for vulnerable dependencies
# Blocks PRs that introduce known security vulnerabilities

name: Dependency Review

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Review Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Fail on high and critical severity vulnerabilities
          fail-on-severity: high
          # Comment on PR with findings
          comment-summary-in-pr: always
          # Allow specific licenses (Apache 2.0, MIT, etc.)
          allow-licenses: Apache-2.0, MIT, BSD-2-Clause, BSD-3-Clause, ISC, MPL-2.0, LGPL-2.1, EPL-1.0, EPL-2.0
          # Exempt specific permissively-licensed packages from the license check.
          # These are Apache-2.0 (Jackson, Error Prone) or EDL-1.0/BSD-3-Clause (JAXB,
          # Jakarta XML Bind, Angus) but the license scanner reports misleading compound
          # SPDX expressions (e.g. bundled BSL-1.0/MIT texts, or CDDL/GPL dual-license
          # notices) that fall outside the allow-list. Exempted by package, all versions.
          allow-dependencies-licenses: pkg:maven/com.fasterxml.jackson.core/jackson-core, pkg:maven/com.google.errorprone/error_prone_annotations, pkg:maven/jakarta.xml.bind/jakarta.xml.bind-api, pkg:maven/org.eclipse.angus/angus-activation, pkg:maven/org.glassfish.jaxb/jaxb-runtime, pkg:maven/org.glassfish.jaxb/txw2
