name: Semantic Version Bump

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read

jobs:
  version-bump:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version bump type
        id: bump
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if printf '%s\n%s' "$PR_TITLE" "$PR_BODY" | grep -qiE "BREAKING CHANGE|!:"; then
            echo "bump=major" >> "$GITHUB_OUTPUT"
          elif echo "$PR_TITLE" | grep -qiE "^(feat|feature)(\(.+\))?:"; then
            echo "bump=minor" >> "$GITHUB_OUTPUT"
          else
            echo "bump=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Get current version
        id: current
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          BASE=$(echo "$VERSION" | sed 's/-.*$//')
          echo "base=$BASE" >> "$GITHUB_OUTPUT"

      - name: Report suggested next version
        env:
          BASE: ${{ steps.current.outputs.base }}
          BUMP: ${{ steps.bump.outputs.bump }}
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEXT="${MAJOR}.${MINOR}.${PATCH}"
          {
            echo "### Suggested next version"
            echo ""
            echo "Bump **$BUMP**: \`$BASE\` → \`$NEXT\`"
            echo ""
            echo "_Advisory only — no commit, tag, or push is made. Set the version manually at release time._"
          } >> "$GITHUB_STEP_SUMMARY"
