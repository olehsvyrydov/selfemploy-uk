# H2 Database Configuration
# Note: The actual database location will be configured in the app module
# This provides defaults for testing

quarkus.datasource.db-kind=h2
# Pinned to match the h2.version in the parent POM (kept below the BOM default for on-disk compatibility)
quarkus.datasource.db-version=2.3.232
quarkus.datasource.jdbc.url=jdbc:h2:mem:selfemploy;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=

# Hibernate ORM
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration
