terms.section7.p3 = 7.3. MONETARY CAP: Our total aggregate liability to you for any and all claims arising from or related to the Software shall not exceed GBP 0.00 (zero pounds), reflecting that this is free, open-source software.
terms.section7.p4 = 7.4. STATUTORY RIGHTS: This limitation of liability DOES NOT exclude or limit liability for: Death or personal injury caused by negligence; Fraud or fraudulent misrepresentation; Any liability that cannot be excluded or limited by applicable law. It does not affect your statutory rights as a consumer under the Consumer Rights Act 2015.
terms.section7.p5 = 7.5. UCTA 1977 REASONABLENESS: You acknowledge that these limitations are reasonable because: The Software is provided free of charge; You have equal bargaining power; Professional verification is readily available; The limitations are clearly stated before acceptance.
