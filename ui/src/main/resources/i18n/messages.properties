terms.important.header = IMPORTANT: PLEASE READ THESE TERMS CAREFULLY BEFORE USING THIS SOFTWARE.
terms.important.intro = By installing, copying, or otherwise using UK Self-Employment Manager ('the Software'), you agree to be bound by these Terms of Service. If you do not agree to these terms, do not use the Software.
terms.section1.title = 1. ACCEPTANCE OF TERMS
terms.section1.p1 = 1.1. These Terms of Service ('Terms') constitute a legally binding agreement between you ('User', 'you') and the developers of UK Self-Employment Manager ('we', 'us').
terms.section1.p2 = 1.2. By clicking 'I Accept' or by installing or using the Software, you confirm that: You have read and understood these Terms; You agree to be bound by these Terms; You are at least 18 years of age; You are legally capable of entering into binding contracts.
terms.section1.p3 = 1.3. If you do not agree to these Terms, you must not use the Software.
terms.section2.title = 2. NATURE OF THE SOFTWARE
terms.section2.p1 = 2.1. UK Self-Employment Manager is a RECORD-KEEPING AND TAX CALCULATION TOOL designed to help UK self-employed individuals: Record business income and expenses; Calculate estimated tax liabilities; Submit Making Tax Digital (MTD) returns to HMRC; Generate tax summaries and reports.
terms.section2.p2 = 2.2. THE SOFTWARE IS NOT: A substitute for professional tax advice; A substitute for professional accounting services; A substitute for professional legal advice; An authoritative source of tax rules or rates; Guaranteed to be error-free or up-to-date.
terms.section3.title = 3. NO PROFESSIONAL ADVICE
terms.section3.badge = CRITICAL
terms.section3.p1 = 3.1. THIS SOFTWARE DOES NOT PROVIDE PROFESSIONAL TAX, ACCOUNTING, LEGAL, OR FINANCIAL ADVICE.
terms.section3.p2 = 3.2. Tax calculations produced by the Software are ESTIMATES ONLY based on: The data you enter; Published HMRC tax rates and thresholds; Our interpretation of tax rules.
terms.section3.p3 = 3.3. Tax calculations MAY NOT reflect: Your specific personal circumstances; Recent changes to tax legislation; Complex tax situations (partnerships, multiple income sources, overseas income); All available allowances, reliefs, or exemptions; Errors in the Software's calculations.
terms.section3.p4 = 3.4. YOU MUST: Verify all calculations independently before submitting to HMRC; Consult a qualified accountant or tax adviser for complex situations; Check HMRC guidance for the most current tax rules; Maintain your own records to support any submission.
terms.section3.p5 = 3.5. WE STRONGLY RECOMMEND seeking professional advice from a qualified accountant, particularly for: First-time Self Assessment submissions; Complex income situations; Capital gains or losses; Foreign income; VAT registration decisions; Any situation where you are uncertain.
terms.section4.title = 4. YOUR RESPONSIBILITIES
terms.section4.p1 = 4.1. Data Accuracy: You are solely responsible for: The accuracy and completeness of all data you enter; Verifying that imported bank data is correctly categorised; Ensuring income and expense classifications are correct; Reviewing all calculations before submission.
terms.section4.p2 = 4.2. HMRC Compliance: You are solely responsible for: Meeting all HMRC filing deadlines; The accuracy of data submitted to HMRC; Maintaining supporting documentation for 6+ years; Responding to any HMRC enquiries; Paying any tax due on time.
terms.section4.p3 = 4.3. Legal Compliance: You acknowledge that: Submitting incorrect information to HMRC may constitute a criminal offence; HMRC may impose penalties for inaccurate or late returns; You bear full responsibility for any penalties, fines, or interest; We cannot verify the accuracy of data you enter.
terms.section4.p4 = 4.4. Software Updates: You are responsible for: Keeping the Software updated to the latest version; Checking for updates before each tax submission; Reading any notices about changes to tax calculations.
terms.section4a.title = 4A. BANK STATEMENT IMPORT
terms.section4a.p1 = 4A.1. Feature Description: The Software includes a Bank Statement Import feature that enables you to import CSV bank statement files from supported UK banks for the purpose of recording business income and expenses.
terms.section4a.p2 = 4A.2. Your Responsibilities: You are solely responsible for: Ensuring you have lawful authority to import the bank statement data; Importing only your own bank statements or those for which you have proper authorisation; Verifying that imported data accurately reflects your bank transactions; Reviewing and correcting all categorisations before using them for tax purposes.
terms.section4a.p3 = 4A.3. CATEGORISATION SUGGESTIONS ARE NOT TAX ADVICE. The Software may suggest expense categories and business/personal classifications. These suggestions are for convenience only. You must review every categorisation, apply your own knowledge, and consult a qualified accountant if uncertain. Incorrect categorisation may result in HMRC penalties of up to 100% of the tax lost.
terms.section4a.p4 = 4A.4. Data Minimisation: Only the minimum data required for tax preparation is extracted: transaction date, amount, description, and account last four digits. All other data is discarded and not stored.
terms.section4a.p5 = 4A.5. Duplicate Detection: SHA-256 hashing is used to prevent duplicate imports. This is a technical safeguard only; you remain responsible for ensuring no transactions are counted twice.
terms.section4a.p6 = 4A.6. Data Retention: Imported bank transaction data is subject to the same 6-year HMRC retention requirement as all other financial records. Do not delete imported data within this period unless you have alternative records.
terms.section4a.p7 = 4A.7. We accept no liability for incorrect categorisation suggestions, errors in business/personal classification, or any HMRC penalties arising from incorrect categorisation. See Section 7 for full limitation of liability.
terms.section5.title = 5. HMRC INTEGRATION
terms.section5.p1 = 5.1. Authorisation: When you connect to HMRC, you authorise the Software to: Retrieve your business details from HMRC; Submit quarterly updates on your behalf; Submit annual Self Assessment returns on your behalf; View your submission history.
terms.section5.p2 = 5.2. Legal Effect: Submissions made through this Software to HMRC are LEGALLY BINDING. They have the same legal status as submissions made directly through HMRC's website.
terms.section5.p3 = 5.3. Fraud Prevention: HMRC requires us to collect and transmit certain device information (fraud prevention headers) with each submission. See our Privacy Notice for details.
terms.section5.p4 = 5.4. Revocation: You may disconnect from HMRC at any time through Settings. This will not affect submissions already made.
terms.section6.title = 6. OPEN SOURCE LICENCE
terms.section6.p1 = 6.1. This Software is provided under the Apache License 2.0. By using the Software, you also accept the terms of the Apache License 2.0.
terms.section6.p2 = 6.2. Key provisions of the Apache License 2.0 include: You may use, modify, and distribute the Software; You must include the original copyright notice and licence; Contributions may be incorporated under the same licence; The Software is provided 'AS IS' WITHOUT WARRANTIES.
