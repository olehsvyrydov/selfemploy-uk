terms.section7.p1a = (a) THE SOFTWARE IS PROVIDED 'AS IS' AND 'AS AVAILABLE' WITHOUT WARRANTY OF ANY KIND, EXPRESS OR IMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF MERCHANTABILITY, FITNESS FOR A PARTICULAR PURPOSE, ACCURACY, OR NON-INFRINGEMENT.
terms.section7.p1b = (b) WE DO NOT WARRANT THAT: The Software will meet your requirements; The Software will be uninterrupted, timely, secure, or error-free; The results obtained from the Software will be accurate or reliable; Any errors in the Software will be corrected.
terms.section7.p2 = 7.2. IN NO EVENT SHALL WE BE LIABLE FOR:
