# --- Privacy notice ---
privacy.header.title = Privacy Notice
privacy.header.close.accessible = Close privacy notice dialog
privacy.hero.title = Your Privacy Matters
privacy.hero.version = Version 2.0
privacy.hero.effective = Effective: 8 February 2026
privacy.section1.title = 1. Who We Are
privacy.section1.p1 = This application is developed and maintained as open-source software under the Apache License 2.0. This privacy notice explains how your data is handled when you use UK Self-Employment Manager.
privacy.section1.p2 = Important: Because all your data is stored locally on your device, YOU are the data controller for your own information. We (the software developers) do not have access to your data.
privacy.section2.title = 2. Data We Process
privacy.section2.sub1.title = 2.1 Financial and Tax Data (Stored Locally)
privacy.section2.sub1.item1 = - Income records: Dates, amounts, descriptions, sources
privacy.section2.sub1.item2 = - Expense records: Dates, amounts, categories, descriptions
privacy.section2.sub1.item3 = - Bank transactions: Imported CSV data from your bank statements
privacy.section2.sub1.item4 = - Tax calculations: Computed tax liabilities based on your data
privacy.section2.sub1.item5 = - Receipt attachments: Images or PDFs you attach to transactions
privacy.section2.sub1.item6 = - Unique Taxpayer Reference (UTR): Your HMRC identifier
privacy.section2.sub1.stored = Where stored: A local database on your device only
privacy.section2.sub1.retention = Retention: You control retention; HMRC requires 6 years minimum
privacy.section2.sub2.title = 2.2 Bank Statement Data (When You Import)
privacy.section2.sub2.intro = When you use the Bank Statement Import feature, the following data is extracted from your CSV files and stored locally:
privacy.section2.sub2.item1 = - Transaction date (required for tax year allocation)
privacy.section2.sub2.item2 = - Transaction amount (required for income/expense calculation)
privacy.section2.sub2.item3 = - Transaction description (required for categorisation)
privacy.section2.sub2.item4 = - Account last 4 digits (minimal identifier for audit trail)
privacy.section2.sub2.minimisation = Data minimisation: We do NOT store full account numbers, sort codes, account holder names, running balances, or bank branch details. Only the minimum data required for tax preparation is retained.
privacy.section2.sub2.csv = Original CSV files are not retained by the Software after import. Categorisation suggestions are algorithmic and are not tax advice.
privacy.section2.sub3.title = 2.3 HMRC Connection Data (When You Connect)
privacy.section2.sub3.intro = When you connect to HMRC for Making Tax Digital submissions, the following data is collected and transmitted:
privacy.section2.sub3.item1 = - Device information: Unique device ID (UUID), operating system, screen configuration
privacy.section2.sub3.item2 = - Network information: Local IP addresses, MAC addresses, timezone
privacy.section2.sub3.item3 = - User information: Operating system username
privacy.section2.sub3.item4 = - Authentication tokens: Access and refresh tokens for HMRC API
privacy.section2.sub3.why = Why: This is legally required by HMRC under the Finance Act 2022 and Transaction Monitoring Regulations. We cannot submit your tax returns without this data.
privacy.section3.title = 3. How We Use Your Data
privacy.section3.item1 = - Calculate your tax liability (Legal basis: Contract performance)
privacy.section3.item2 = - Import and categorise bank transactions (Legal basis: Contract performance)
privacy.section3.item3 = - Submit returns to HMRC (Legal basis: Contract performance)
privacy.section3.item4 = - Comply with HMRC fraud prevention (Legal basis: Legal obligation)
privacy.section3.item5 = - Store HMRC access tokens (Legal basis: Legitimate interests)
privacy.section3.item6 = - Maintain audit trail (Legal basis: Legitimate interests)
privacy.section4.title = 4. Data Storage and Security
privacy.section4.p1 = All your financial data is stored ONLY on your device.
privacy.section4.p2 = We implement the following security measures:
privacy.section4.item1 = - AES-256-GCM encryption for your HMRC credentials and National Insurance number
privacy.section4.item2 = - Optional passphrase protection encrypts your whole database at rest (SQLCipher, AES-256); without a passphrase the database is not encrypted
privacy.section4.item3 = - TLS 1.2+ encryption for all communications with HMRC
privacy.section4.p3 = We do NOT: Store your data on any remote servers, have access to your financial information, share your data with third parties (except HMRC when you initiate a submission), or use your data for analytics, advertising, or any other purpose.
privacy.section5.title = 5. Data Retention
privacy.section5.item1 = - Financial records and imported bank transactions: You decide (HMRC requires 6 years minimum)
privacy.section5.item2 = - HMRC tokens: Until you disconnect
privacy.section5.item3 = - Acknowledgment records: Indefinite (audit trail)
privacy.section5.responsibility = Your responsibility: HMRC requires you to keep records for at least 6 years from the 31 January following the tax year (s.12B Taxes Management Act 1970). Penalties for inadequate records can be up to £3,000 per tax year. This application helps you meet this requirement, but the legal responsibility remains yours.
privacy.section6.title = 6. Your Rights Under UK GDPR
privacy.section6.item1 = - Access: Request a copy of your data (Export feature in Settings)
privacy.section6.item2 = - Rectification: Correct inaccurate data (Edit records in the application)
privacy.section6.item3 = - Erasure: Delete your data (Delete records or uninstall application)
privacy.section6.item4 = - Restriction: Limit how data is processed (Contact us)
privacy.section6.item5 = - Portability: Receive data in portable format (Export to JSON/CSV)
privacy.section6.item6 = - Object: Object to processing (Contact us)
privacy.section6.item7 = - Complain: Lodge complaint with ICO (ico.org.uk)
privacy.section6.note = Note: Because your data is stored locally on your device, you already have full control. You can view, edit, export, or delete any data at any time.
privacy.section7.title = 7. HMRC Fraud Prevention
privacy.section7.p1 = When you connect to HMRC, certain device information is collected and transmitted as required by law. This includes device identifiers (UUID), operating system information, network information (local IP, MAC addresses), and timezone and screen configuration.
privacy.section7.p2 = This is not optional. HMRC will reject submissions without this information.
privacy.section8.title = 8. Changes to This Notice
privacy.section8.p1 = We may update this privacy notice to reflect changes in the application or legal requirements. If we make material changes, the privacy notice version number will change, you will be asked to acknowledge the updated notice, and a summary of changes will be provided.
privacy.section9.title = 9. Contact
privacy.section9.p1 = For privacy-related questions, please visit GitHub Issues. To complain about data protection, contact the Information Commissioner's Office (ICO) at ico.org.uk or call the ICO Helpline at 0303 123 1113.
privacy.legalBasis.title = Legal Basis Summary
privacy.legalBasis.item1 = - Core functionality: Contract performance (Article 6(1)(b))
privacy.legalBasis.item2 = - Bank statement import: Contract performance (Article 6(1)(b))
privacy.legalBasis.item3 = - HMRC fraud prevention: Legal obligation (Article 6(1)(c))
privacy.legalBasis.item4 = - Token storage and audit trail: Legitimate interests (Article 6(1)(f))
privacy.legalBasis.compliance = This privacy notice complies with UK GDPR Articles 13 and 14.
