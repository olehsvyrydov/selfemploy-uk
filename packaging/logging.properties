# Logging configuration for the packaged desktop app, loaded via
# -Djava.util.logging.config.file=$APPDIR/logging.properties.
#
# The GUI launcher has no console on Windows and macOS, so a rotating file under the user's
# temp directory is the primary sink field diagnostics can actually be collected from; the
# console handler still serves launches from a terminal. Application categories log at FINE,
# everything else stays at INFO.
handlers=java.util.logging.FileHandler,java.util.logging.ConsoleHandler
java.util.logging.FileHandler.pattern=%t/selfemploy-app-%g.log
java.util.logging.FileHandler.limit=1000000
java.util.logging.FileHandler.count=3
java.util.logging.FileHandler.level=FINE
java.util.logging.FileHandler.formatter=java.util.logging.SimpleFormatter
java.util.logging.ConsoleHandler.level=FINE
java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter
java.util.logging.SimpleFormatter.format=%1$tF %1$tT %4$s [%3$s] %5$s%6$s%n
.level=INFO
uk.selfemploy.level=FINE
